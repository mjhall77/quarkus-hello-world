schemaVersion: 2.2.0
metadata:
  name: quarkus-hello-world

# 1. The new way to define IDE Extensions in Devfile v2
attributes:
  .vscode/extensions.json: |
    {
      "recommendations": [
        "Continue.continue"
      ]
    }

components:
  # 2. The main development container (no plugin component here!)
  - name: dev-tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi8-latest
      memoryRequest: 1G
      memoryLimit: 2G
      mountSources: true
      endpoints:
        - name: quarkus-web
          targetPort: 8080
          exposure: public

commands:
  - id: start-app
    exec:
      component: dev-tools
      workingDir: ${PROJECT_SOURCE}/hello-world
      commandLine: mvnw compile quarkus:dev
      group:
        kind: run
        isDefault: true

events:
  postStart:
    - start-app
