schemaVersion: 2.2.0
metadata:
  name: quarkus-hello-world
components:
  # 1. The main development container
  - name: dev-tools
    container:
      image: quay.io/devfile/universal-developer-image:ubi8-latest
      memoryRequest: 1G
      memoryLimit: 2G
      mountSources: true
      endpoints:
        - name: quarkus-web
          targetPort: 8080
          exposure: public

  # 2. The Continue AI Code Assistant Plugin
  - name: continue-ai
    plugin:
      id: Continue/continue/1.3.28
      registryUrl: https://open-vsx.org

commands:
  # 3. The command to run your Quarkus app
  - id: start-app
    exec:
      component: dev-tools
      workingDir: ${PROJECT_SOURCE}
      commandLine: ./mvnw compile quarkus:dev
      group:
        kind: run
        isDefault: true

events:
  # 4. Automating the launch
  postStart:
    - start-app
