schemaVersion: 2.2.0
metadata:
  name: quarkus-continue-env
  version: 1.0.0
  description: Quarkus development environment.
  tags: ["Java", "Quarkus", "Maven"]

components:
  - name: quarkus-dev
    container:
      image: quay.io/devfile/universal-developer-image:ubi8-latest
      memoryLimit: 4G
      memoryRequest: 2G
      mountSources: true
      endpoints:
        - name: http-quarkus
          targetPort: 8080
          exposure: public
        - name: debug
          targetPort: 5005
          exposure: none

commands:
  - id: build
    exec:
      component: quarkus-dev
      commandLine: mvn compile quarkus:dev -Dquarkus.http.host=0.0.0.0
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: build
        isDefault: true

  - id: run-dev
    exec:
      component: quarkus-dev
      commandLine: mvn compile quarkus:dev
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: run
        isDefault: true

  - id: debug
    exec:
      component: quarkus-dev
      commandLine: mvn compile quarkus:dev -Dsuspend
      workingDir: ${PROJECT_SOURCE}
      group:
        kind: debug
        isDefault: true
