# 1. Listen on all network interfaces
quarkus.http.host=0.0.0.0

# 2. Tell the Dev UI to trust your OpenShift route
%dev.quarkus.dev-ui.hosts=mikehall-quarkus-hello-world-quarkus-web.apps.managed.redhat.ten.vibrintlabs.net

# 3. Enable CORS using the updated Quarkus 3 syntax
%dev.quarkus.http.cors.enabled=true
%dev.quarkus.http.cors.origins=/.*/
